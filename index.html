<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Regina Titan OS</title>

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1458/1458512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --gold: #c5a059; --teal: #004d40; --glass: rgba(255, 255, 255, 0.96); }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f4f7f6; /* Fond neutre pour faire ressortir la carte */
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
        }

        /* FIX DU MENU : Priorité absolue (z-index) */
        .sidebar { 
            position: fixed; top: 0; left: -100%; width: 80%; height: 100%; 
            background: white; z-index: 9999; /* Au-dessus de TOUT */
            transition: 0.4s cubic-bezier(0.7, 0, 0.3, 1); padding: 40px;
            box-shadow: 20px 0 50px rgba(0,0,0,0.1);
        }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 9998; backdrop-filter: blur(4px); }

        /* HEADER PROFESSIONNEL */
        .header { 
            position: absolute; top: 0; width: 100%; z-index: 1000;
            padding: 50px 0 20px; text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            color: white; pointer-events: none; /* Laisse passer les clics vers le bouton menu */
        }
        .menu-trigger { 
            position: absolute; top: 55px; left: 20px; font-size: 1.8rem; 
            cursor: pointer; pointer-events: auto; z-index: 1001;
        }
        .bible-quote { font-family: 'Playfair Display', serif; font-size: 0.85rem; color: var(--gold); font-style: italic; margin-top: 5px; padding: 0 20px; }

        /* CONTENEUR CARTE PLEIN ÉCRAN */
        #v-carto { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #map-container { height: 100%; width: 100%; }

        /* FLUX ET AGENDA (En superposition si besoin) */
        .view-overlay { 
            position: absolute; top: 120px; left: 0; width: 100%; height: calc(100% - 200px); 
            z-index: 500; overflow-y: auto; background: #f4f7f6;
        }

        /* BOUTONS CARTE MODERNES */
        .map-controls { position: absolute; top: 120px; right: 15px; z-index: 800; display: flex; flex-direction: column; gap: 10px; }
        .map-btn { 
            background: white; border: none; width: 50px; height: 50px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer;
        }

        /* NAVIGATION BASSE STYLE APPLI */
        .nav-bar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 85%; height: 75px; display: flex; justify-content: space-around; align-items: center; 
            background: white; border-radius: 30px; z-index: 2000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-btn { border: none; background: none; color: #ccc; text-align: center; font-size: 0.6rem; font-weight: 800; transition: 0.3s; }
        .nav-btn.active { color: var(--teal); }
        .nav-icon { font-size: 1.6rem; display: block; margin-bottom: 3px; }

        .add-btn { 
            position: fixed; bottom: 125px; right: 25px; width: 60px; height: 60px; 
            border-radius: 20px; background: var(--teal); color: white; border: none; 
            font-size: 30px; z-index: 1500; box-shadow: 0 8px 20px rgba(0,77,64,0.3);
        }

        .hidden { display: none !important; }
        
        /* STYLE DES CARTES DANS LE FLUX */
        .card { background: white; margin: 15px; padding: 20px; border-radius: 20px; border-left: 4px solid var(--teal); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<div id="sidebar" class="sidebar">
    <div style="font-size: 40px;">👑</div>
    <h2 style="color: var(--teal); font-weight: 800;">Paramètres</h2>
    <hr style="border:0; height:1px; background:#eee; margin:20px 0;">
    <p style="font-size: 0.9rem; color:#666;">Application de Vision Foncière<br><b>Mme Regina LOKONON</b></p>
    <p style="font-size: 0.7rem; margin-top: 20px; color: var(--gold); font-weight: 800;">DÉVELOPPÉ PAR GODFREE</p>
    <button onclick="toggleSidebar()" style="margin-top: 40px; width: 100%; padding: 15px; border-radius: 12px; background: #f5f5f5; border:none; font-weight: 800;">Fermer</button>
</div>

<div class="header">
    <div class="menu-trigger" onclick="toggleSidebar()">☰</div>
    <div style="font-weight: 800; letter-spacing: 2px;">REGINA TITAN</div>
    <div id="dynamic-bible" class="bible-quote">"Je puis tout par celui qui me fortifie."</div>
</div>

<div id="v-carto">
    <div id="map-container"></div>
    <div class="map-controls">
        <button class="map-btn" onclick="toggleLayer()">🛰️</button>
        <button class="map-btn" onclick="centerTogo()">🇹🇬</button>
    </div>
</div>

<div id="v-main" class="view-overlay hidden"><div id="main-list"></div></div>
<div id="v-cal" class="view-overlay hidden"><div id="calGrid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 20px;"></div></div>

<button class="add-btn" onclick="askType()">+</button>

<nav class="nav-bar">
    <button class="nav-btn" onclick="showV('v-main', this)"><span class="nav-icon">📜</span>FLUX</button>
    <button class="nav-btn active" onclick="showV('v-carto', this)"><span class="nav-icon">🗺️</span>CARTO</button>
    <button class="nav-btn" onclick="showV('v-cal', this)"><span class="nav-icon">📅</span>AGENDA</button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('regina_v23')) || [];
    let map, isSat = false;

    function initMap() {
        if(map) return;
        // Style de carte "Positron" (clair et pro comme ton image de Paris)
        map = L.map('map-container', { zoomControl: false, attributionControl: false }).setView([6.13, 1.22], 13); 
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        map.on('contextmenu', (e) => {
            let n = prompt("Nom du terrain au Togo :");
            if(n) {
                L.marker([e.latlng.lat, e.latlng.lng]).addTo(map).bindPopup(n).openPopup();
                db.unshift({id: Date.now(), type:'vision', t: "Terrain: "+n, c: "Coordonnées GPS enregistrées.", d: new Date().toLocaleDateString(), lat: e.latlng.lat, lng: e.latlng.lng});
                save();
            }
        });
        db.filter(i => i.lat).forEach(i => L.marker([i.lat, i.lng]).addTo(map).bindPopup(i.t));
    }

    function toggleSidebar() {
        const side = document.getElementById('sidebar');
        const over = document.getElementById('overlay');
        side.classList.toggle('active');
        over.style.display = side.classList.contains('active') ? 'block' : 'none';
    }

    function showV(id, b) {
        document.querySelectorAll('.view-overlay').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        
        if (id !== 'v-carto') {
            document.getElementById(id).classList.remove('hidden');
        }
        b.classList.add('active');
        if(id === 'v-carto') { map.invalidateSize(); }
    }

    function toggleLayer() {
        isSat = !isSat;
        let url = isSat ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
        L.tileLayer(url).addTo(map);
    }

    function centerTogo() { map.setView([6.13, 1.22], 13); }

    function askType() {
        let choice = confirm("OK pour VISION 🔭\nANNULER pour BIBLE 📖");
        let t = prompt(choice ? "Titre Vision :" : "Référence Bible :");
        if(!t) return;
        db.unshift({id: Date.now(), type: choice?'vision':'bible', t, c: "...", d: new Date().toLocaleDateString()});
        save();
    }

    function save() { localStorage.setItem('regina_v23', JSON.stringify(db)); render(); }

    function render() {
        document.getElementById('main-list').innerHTML = db.map(i => `
            <div class="card">
                <div style="font-size:0.6rem; font-weight:800; color:var(--gold); margin-bottom:5px;">${i.type === 'vision' ? '🔭 VISION' : '📖 PAROLE'}</div>
                <div style="font-weight:800; color:var(--teal); font-size:1.1rem;">${i.t}</div>
                <div style="font-size:0.9rem; color:#555; margin-top:5px;">${i.c}</div>
                <div style="margin-top:10px; font-size:0.7rem; opacity:0.5;">📍 ${i.d} <span onclick="del(${i.id})" style="color:red; margin-left:10px;">Supprimer</span></div>
            </div>
        `).join('');
    }

    function del(id) { if(confirm("Supprimer ?")) { db = db.filter(x => x.id !== id); save(); } }

    window.onload = () => { initMap(); render(); };
</script>
</body>
</html>
